# CI/CD pipeline for Proteus Actuarial Library
#
# This workflow runs tests and builds the package.
#
# Triggers:
# - Push/PR: Runs tests only for code validation
# - GitHub Release: Runs full pipeline (test → build → publish to PyPI)
#
# Jobs:
# - docker-build: Builds CI image once and shares it across jobs
# - static-analysis: Runs linting/type checking using Docker
# - test: Runs pytest with coverage on Python 3.12 and 3.13 (matrix)
# - build: Builds Python packages using standard build tool
# - pypi-publish: Publishes to PyPI using trusted publishing (release only)
#
# To release: Create a GitHub Release, which triggers automatic PyPI publishing.

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build CI Docker image
        run: docker build --target ci -t proteus-ci -f Dockerfile.cpu .

      - name: Save Docker image
        run: docker save proteus-ci > proteus-ci.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v6
        with:
          name: proteus-ci-image
          path: proteus-ci.tar

  static-analysis:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v6

      - name: Download Docker image
        uses: actions/download-artifact@v7
        with:
          name: proteus-ci-image

      - name: Load Docker image
        run: docker load < proteus-ci.tar

      # Install dev dependencies for static analysis tools
      - name: Install dev dependencies
        run: docker run --rm proteus-ci pip install -e ".[dev]"

      - name: Run static analysis
        run: docker run --rm proteus-ci make static-analysis

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: |
          mkdir -p coverage
          pytest -v --cov=pal --cov-report=xml:coverage/coverage-${{ matrix.python-version }}.xml --codeblocks

      # Validate example scripts can compile without running them
      # This checks syntax and import resolution without starting Flask servers
      # or other services that would complicate CI testing
      - name: Check examples compile
        run: python -m compileall examples/ -f

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        with:
          name: coverage-reports-${{ matrix.python-version }}
          path: coverage/

  build:
    runs-on: ubuntu-latest
    needs: [docker-build, test]
    # Always build package to ensure build process works

    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch full git history for version determination
          fetch-depth: 0

      - name: Download Docker image
        uses: actions/download-artifact@v7
        with:
          name: proteus-ci-image

      - name: Load Docker image
        run: docker load < proteus-ci.tar

      - name: Build main package
        # Create dist directory and mount it to container to persist build artifacts
        # Maps host dist/ to container's /app/dist so files survive container exit
        run: |
          mkdir -p dist
          docker run --rm -v "$(pwd)/dist:/app/dist" proteus-ci \
            python -m build --outdir /app/dist

      - name: Build mirror package (proteus-actuarial-library)
        # Build the legacy mirror package for backward compatibility
        # This package re-exports all functionality from proteusllp-actuarial-library
        run: |
          docker run --rm \
            -v "$(pwd)/mirror-package:/app/mirror-package" \
            -w /app/mirror-package \
            proteus-ci \
            python -m build
          # Copy mirror package distributions to main dist directory
          cp mirror-package/dist/* dist/

      - name: List built distributions
        run: ls -lh dist/

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: release-dists
          path: dist/
        # Only upload artifacts on releases to save storage
        if: github.event_name == 'release'

  pypi-publish:
    runs-on: ubuntu-latest
    needs: build
    # Only publish to PyPI when a GitHub Release is created
    if: github.event_name == 'release'
    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v7
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
