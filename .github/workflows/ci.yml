# CI/CD pipeline for Proteus Actuarial Library
#
# This workflow runs tests and builds the package.
#
# Triggers:
# - Push/PR: Runs tests and static analysis for code validation
# - GitHub Release: Runs full pipeline (test → build → publish to PyPI)
#
# Jobs:
# - static-analysis: Runs linting/type checking on Python 3.13
# - test: Runs pytest with coverage on Python 3.12 and 3.13 (matrix)
# - build: Builds Python packages using standard build tool
# - pypi-publish: Publishes to PyPI using trusted publishing (release only)
#
# To release: Create a GitHub Release, which triggers automatic PyPI publishing.

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,test]"

      - name: Run static analysis
        run: make static-analysis

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: |
          mkdir -p coverage
          pytest -v --cov=pal --cov-report=xml:coverage/coverage-${{ matrix.python-version }}.xml --codeblocks

      # Validate example scripts can compile without running them
      # This checks syntax and import resolution without starting Flask servers
      # or other services that would complicate CI testing
      - name: Check examples compile
        run: python -m compileall examples/ -f

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-${{ matrix.python-version }}
          path: coverage/

  build:
    runs-on: ubuntu-latest
    needs: test
    # Always build package to ensure build process works

    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch full git history for version determination
          fetch-depth: 0
          # For release events, checkout the release tag explicitly
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build setuptools-scm

      - name: Build main package
        run: python -m build

      - name: Build mirror package (proteus-actuarial-library)
        # Build the legacy mirror package for backward compatibility
        # This package re-exports all functionality from proteusllp-actuarial-library
        run: |
          cd mirror-package
          python -m build
          cd ..
          # Copy mirror package distributions to main dist directory
          cp mirror-package/dist/* dist/

      - name: List built distributions
        run: ls -lh dist/

      - name: Verify version matches release tag
        if: github.event_name == 'release'
        run: |
          # Extract version from release tag (remove 'v' prefix if present)
          RELEASE_VERSION="${{ github.event.release.tag_name }}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          echo "Release tag version: $RELEASE_VERSION"
          
          # Check if built package matches release version
          if ! ls dist/*-${RELEASE_VERSION}-*.whl 2>/dev/null; then
            echo "ERROR: Built package version does not match release tag!"
            echo "Expected version: $RELEASE_VERSION"
            echo "Built packages:"
            ls -1 dist/*.whl
            exit 1
          fi
          echo "✓ Package version matches release tag"

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/
        # Only upload artifacts on releases to save storage
        if: github.event_name == 'release'

  pypi-publish:
    runs-on: ubuntu-latest
    needs: build
    # Only publish to PyPI when a GitHub Release is created
    if: github.event_name == 'release'
    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          verbose: true
